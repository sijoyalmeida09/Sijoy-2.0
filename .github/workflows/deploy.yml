name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'sijoy.html'
      - 'assets/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  github-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  hostinger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            REPO_URL="https://github.com/sijoyalmeida09/Sijoy-2.0.git"
            ROOT_DIR=/home/u641303756/domains/joshoit.com/public_html
            SIJOY_DIR=$ROOT_DIR/sijoy

            # --- Pull repo into sijoy/ subdirectory ---
            if [ ! -d "$SIJOY_DIR/.git" ]; then
              mkdir -p $SIJOY_DIR
              cd $SIJOY_DIR
              git clone $REPO_URL .
            else
              cd $SIJOY_DIR
              git fetch origin main
              git reset --hard origin/main
            fi

            # --- joshoit.com (business homepage = index.html from repo) ---
            cp $SIJOY_DIR/index.html $ROOT_DIR/index.html
            cp -r $SIJOY_DIR/assets $ROOT_DIR/assets 2>/dev/null || true
            echo "✅ joshoit.com deployed (index.html)"

            # --- sijoy.joshoit.com (personal portfolio = sijoy.html → index.html in sijoy/) ---
            cp $SIJOY_DIR/sijoy.html $SIJOY_DIR/index.html
            echo "✅ sijoy.joshoit.com deployed (sijoy.html)"
